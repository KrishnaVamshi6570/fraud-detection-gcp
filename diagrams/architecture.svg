<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="520" fill="#F8F9FA" rx="12"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1A237E">GCP Fraud Detection Pipeline — Architecture</text>

  <!-- Row 1: Data Source -->
  <rect x="30" y="60" width="130" height="55" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
  <text x="95" y="83" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565C0">IEEE-CIS Dataset</text>
  <text x="95" y="100" text-anchor="middle" font-size="10" fill="#1565C0">590,540 transactions</text>

  <!-- Arrow -->
  <line x1="160" y1="87" x2="195" y2="87" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- GCS -->
  <rect x="195" y="60" width="120" height="55" rx="8" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="255" y="83" text-anchor="middle" font-size="11" font-weight="bold" fill="#2E7D32">Cloud Storage</text>
  <text x="255" y="100" text-anchor="middle" font-size="10" fill="#2E7D32">Raw CSV files</text>

  <!-- Arrow -->
  <line x1="315" y1="87" x2="350" y2="87" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- BigQuery Raw -->
  <rect x="350" y="60" width="120" height="55" rx="8" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="410" y="83" text-anchor="middle" font-size="11" font-weight="bold" fill="#2E7D32">BigQuery</text>
  <text x="410" y="100" text-anchor="middle" font-size="10" fill="#2E7D32">Raw tables</text>

  <!-- Arrow -->
  <line x1="470" y1="87" x2="505" y2="87" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Feature Engineering -->
  <rect x="505" y="60" width="130" height="55" rx="8" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <text x="570" y="83" text-anchor="middle" font-size="11" font-weight="bold" fill="#E65100">Feature Engineering</text>
  <text x="570" y="100" text-anchor="middle" font-size="10" fill="#E65100">20+ SQL features</text>

  <!-- Arrow -->
  <line x1="635" y1="87" x2="670" y2="87" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- BQML -->
  <rect x="670" y="60" width="130" height="55" rx="8" fill="#FCE4EC" stroke="#880E4F" stroke-width="1.5"/>
  <text x="735" y="83" text-anchor="middle" font-size="11" font-weight="bold" fill="#880E4F">BigQuery ML</text>
  <text x="735" y="100" text-anchor="middle" font-size="10" fill="#880E4F">XGBoost AUC 0.936</text>

  <!-- Divider -->
  <line x1="30" y1="145" x2="870" y2="145" stroke="#BDBDBD" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="450" y="162" text-anchor="middle" font-size="11" fill="#757575" font-style="italic">Streaming Pipeline</text>

  <!-- Row 2: Streaming -->
  <!-- Python Generator -->
  <rect x="30" y="175" width="130" height="55" rx="8" fill="#E8EAF6" stroke="#283593" stroke-width="1.5"/>
  <text x="95" y="198" text-anchor="middle" font-size="11" font-weight="bold" fill="#283593">Python Generator</text>
  <text x="95" y="215" text-anchor="middle" font-size="10" fill="#283593">Fake transactions</text>

  <!-- Arrow -->
  <line x1="160" y1="202" x2="195" y2="202" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Pub/Sub -->
  <rect x="195" y="175" width="120" height="55" rx="8" fill="#E8EAF6" stroke="#283593" stroke-width="1.5"/>
  <text x="255" y="198" text-anchor="middle" font-size="11" font-weight="bold" fill="#283593">Cloud Pub/Sub</text>
  <text x="255" y="215" text-anchor="middle" font-size="10" fill="#283593">fraud-transactions</text>

  <!-- Arrow -->
  <line x1="315" y1="202" x2="350" y2="202" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Apache Beam -->
  <rect x="350" y="175" width="120" height="55" rx="8" fill="#E8EAF6" stroke="#283593" stroke-width="1.5"/>
  <text x="410" y="198" text-anchor="middle" font-size="11" font-weight="bold" fill="#283593">Apache Beam</text>
  <text x="410" y="215" text-anchor="middle" font-size="10" fill="#283593">Dataflow runner</text>

  <!-- Arrow -->
  <line x1="470" y1="202" x2="505" y2="202" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- BQ Streaming -->
  <rect x="505" y="175" width="130" height="55" rx="8" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="570" y="198" text-anchor="middle" font-size="11" font-weight="bold" fill="#2E7D32">BigQuery</text>
  <text x="570" y="215" text-anchor="middle" font-size="10" fill="#2E7D32">Streaming buffer</text>

  <!-- Divider -->
  <line x1="30" y1="258" x2="870" y2="258" stroke="#BDBDBD" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="450" y="275" text-anchor="middle" font-size="11" fill="#757575" font-style="italic">Serving Layer</text>

  <!-- Row 3: Serving -->
  <!-- Fraud Scores -->
  <rect x="100" y="288" width="140" height="55" rx="8" fill="#FCE4EC" stroke="#880E4F" stroke-width="1.5"/>
  <text x="170" y="311" text-anchor="middle" font-size="11" font-weight="bold" fill="#880E4F">fraud_scores table</text>
  <text x="170" y="328" text-anchor="middle" font-size="10" fill="#880E4F">590K predictions</text>

  <!-- Arrow -->
  <line x1="240" y1="315" x2="275" y2="315" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Cloud Run -->
  <rect x="275" y="288" width="140" height="55" rx="8" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <text x="345" y="311" text-anchor="middle" font-size="11" font-weight="bold" fill="#E65100">Cloud Run API</text>
  <text x="345" y="328" text-anchor="middle" font-size="10" fill="#E65100">FastAPI + Docker</text>

  <!-- Arrow -->
  <line x1="415" y1="315" x2="450" y2="315" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Looker -->
  <rect x="450" y="288" width="140" height="55" rx="8" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="520" y="311" text-anchor="middle" font-size="11" font-weight="bold" fill="#2E7D32">Looker Studio</text>
  <text x="520" y="328" text-anchor="middle" font-size="10" fill="#2E7D32">Live dashboard</text>

  <!-- Arrow -->
  <line x1="590" y1="315" x2="625" y2="315" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- End User -->
  <rect x="625" y="288" width="140" height="55" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
  <text x="695" y="311" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565C0">Analyst / System</text>
  <text x="695" y="328" text-anchor="middle" font-size="10" fill="#1565C0">Real-time scoring</text>

  <!-- Model Results Box -->
  <rect x="30" y="385" width="840" height="110" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1.5"/>
  <text x="450" y="408" text-anchor="middle" font-size="13" font-weight="bold" fill="#1A237E">Model Results</text>
  <text x="160" y="435" text-anchor="middle" font-size="12" fill="#333">🎯 XGBoost AUC</text>
  <text x="160" y="455" text-anchor="middle" font-size="16" font-weight="bold" fill="#880E4F">0.936</text>
  <text x="320" y="435" text-anchor="middle" font-size="12" fill="#333">✅ Recall</text>
  <text x="320" y="455" text-anchor="middle" font-size="16" font-weight="bold" fill="#2E7D32">84.76%</text>
  <text x="480" y="435" text-anchor="middle" font-size="12" fill="#333">📊 Accuracy</text>
  <text x="480" y="455" text-anchor="middle" font-size="16" font-weight="bold" fill="#1565C0">86.81%</text>
  <text x="640" y="435" text-anchor="middle" font-size="12" fill="#333">🔴 HIGH Risk Precision</text>
  <text x="640" y="455" text-anchor="middle" font-size="16" font-weight="bold" fill="#E65100">53.44%</text>
  <text x="800" y="435" text-anchor="middle" font-size="12" fill="#333">📦 Transactions</text>
  <text x="800" y="455" text-anchor="middle" font-size="16" font-weight="bold" fill="#283593">590,540</text>
  <text x="450" y="485" text-anchor="middle" font-size="10" fill="#9E9E9E">Top features: card1_historical_fraud_rate · C1 · C13 · email_domain_fraud_rate · amt_zscore_vs_card</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
  </defs>
</svg>
